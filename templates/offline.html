<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión — La Liga del Peso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .offline-icon { font-size: 5rem; }
    </style>
</head>
<body>
    <div class="text-center p-4">
        <div class="offline-icon mb-3">🏋️</div>
        <h1 class="fw-bold mb-2">Sin conexión</h1>
        <p class="lead mb-4 opacity-75">
            Parece que el zampabollos se ha comido el cable de internet.<br>
            Vuelve a intentarlo cuando tengas conexión.
        </p>
        <button onclick="window.location.reload()" class="btn btn-warning btn-lg fw-bold">
            <i class="bi bi-arrow-clockwise me-2"></i>Reintentar
        </button>
    </div>
</body>
</html>
